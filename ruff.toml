line-length = 120
target-version = "py312"

exclude = [".git",".gitlab",".vscode","env",".env",".venv",".pytest_cache",".mypy_cache", "migrations", "tests"]

[lint]
select = [
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "C90",  # mccabe
    "D",    # pydocstyle
    "E",    # pycodestyle errors
    "F",    # Pyflakes
    "I",    # isort
    "W",    # pycodestyle warnings
    "UP",   # pyupgrade
]
ignore = [
    # flake8-bugbear
    "B008",  # Do not perform function call `{name}` in argument defaults
    "B904",  # Use 'raise ... from err' or 'raise ... from None' in 'except*' blocks to distinguish handling errors

    # flake8-comprehensions
    "C408",  # Unnecessary `{kind}()` call (rewrite as a literal)

    # pydocstyle
    "D100",  # Missing docstring in public module
    "D101",  # Missing docstring in public class
    "D102",  # Missing docstring in public method
    "D103",  # Missing docstring in public function
    "D104",  # Missing docstring in public package
    "D105",  # Missing docstring in magic method
    "D106",  # Missing docstring in public nested class
    "D107",  # Missing docstring in `__init__`
    "D200",  # One-line docstring should fit on one line with quotes
    "D202",  # No blank lines allowed after function docstring (found {num_lines})
    "D203",  # 1 blank line required before class docstring
    "D205",  # 1 blank line required between summary line and description
    "D212",  # Multi-line docstring summary should start at the first line
    "D213",  # Multi-line docstring summary should start at the second line
    "D301",  # Use `r"""` if any backslashes in a docstring
    "D400",  # First line should end with a period
    "D413",  # Missing blank line after last section ("{name}")
    "D415",  # First line should end with a period, question mark, or exclamation point

    # pycodestyle
    "E203",  # Whitespace before '{symbol}'
    "E226",  # Missing whitespace around arithmetic operator
    "E231",  # Missing whitespace after {}
    "E722",  # Do not use bare `except`
    "E731",  # Do not assign a `lambda` expression, use a `def`
    "W605",  # Invalid escape sequence
]
